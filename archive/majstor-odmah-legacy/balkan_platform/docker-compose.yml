services:
  api:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: balkan_works
      POSTGRES_USER: balkan
      POSTGRES_PASSWORD: balkan
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balkan -d balkan_works"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - balkan_postgres:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  balkan_postgres:
