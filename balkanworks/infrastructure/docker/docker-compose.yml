services:
  postgres:
    image: postgres:16-alpine
    environment: [POSTGRES_DB=balkanworks, POSTGRES_USER=balkanworks, POSTGRES_PASSWORD=change-me]
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  minio:
    image: minio/minio
    command: server /data --console-address :9001
    environment: [MINIO_ROOT_USER=balkanworks, MINIO_ROOT_PASSWORD=change-me-now]
    ports: ["9000:9000", "9001:9001"]
