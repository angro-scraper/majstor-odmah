name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  verify:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @balkanworks/database prisma:validate
        env:
          DATABASE_URL: postgresql://balkanworks:balkanworks@localhost:5432/balkanworks
      - run: pnpm --filter @balkanworks/database prisma:generate
      - run: pnpm --filter @balkanworks/api prisma:generate
      - run: pnpm --filter @balkanworks/database build
      - run: pnpm --filter @balkanworks/api build
      - run: pnpm --filter @balkanworks/api test
      - run: pnpm lint
      - run: pnpm audit --prod --audit-level=high
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://balkanworks-api.onrender.com/api/v1
      - run: pnpm --filter @balkanworks/web build
        env:
          NEXT_PUBLIC_API_URL: https://balkanworks-api.onrender.com/api/v1
