name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @balkanworks/database prisma:generate
      - run: pnpm --filter @balkanworks/database build
      - run: pnpm --filter @balkanworks/api build
      - run: pnpm --filter @balkanworks/api test -- --runInBand
      - run: pnpm --filter @balkanworks/web build
        env:
          NEXT_PUBLIC_API_URL: https://balkanworks-api.onrender.com/api/v1
